name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Install dependencies
        run: npm install
        
      - name: Sync Capacitor
        run: npx cap sync
        
      - name: Enable zoom in WebView
        run: |
          # Modificar MainActivity.java para habilitar zoom
          MAIN_ACTIVITY="android/app/src/main/java/com/tuempresa/fincavet/MainActivity.java"
          if [ -f "$MAIN_ACTIVITY" ]; then
            sed -i 's/import com.getcapacitor.BridgeActivity;/import com.getcapacitor.BridgeActivity;\nimport android.webkit.WebSettings;\nimport android.webkit.WebView;/' "$MAIN_ACTIVITY"
            sed -i 's/super.onCreate(savedInstanceState);/super.onCreate(savedInstanceState);\n        WebView webView = getBridge().getWebView();\n        WebSettings settings = webView.getSettings();\n        settings.setBuiltInZoomControls(true);\n        settings.setDisplayZoomControls(false);\n        settings.setSupportZoom(true);/' "$MAIN_ACTIVITY"
          fi
        
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fincavet-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
